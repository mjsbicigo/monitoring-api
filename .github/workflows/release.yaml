name: CI - Test, Build and Release

on:
  push:
    branches:
      - master
    paths-ignore:
      - '.github/workflows/**'
      - '**/*.md'
      - '.gitignore'
      - '.dockerignore'

jobs:
  build_and_deploy:
    name: 'Test, Build and Push Image'
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_REPOSITORY: "marciosbicigo/monitoring-api"
      DOCKERFILE_PATH: "."

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install Dependencies and Run Tests
      run: |
        python -m pip install --upgrade pip
        # Install dependencies from requirements.txt
        pip install -r tests/requirements-test.txt
        pip install pytest
        # Run tests with verbose output
        pytest tests/ -v

    - name: Declare variables
      id: vars
      shell: bash
      run: |
        if [ -z "$DOCKERHUB_REPOSITORY" ]; then
          echo "DOCKERHUB_REPOSITORY cannot be empty"
          exit 1
        fi

    - name: Bump version and push tag
      id: tag_version
      uses: mathieudutour/github-tag-action@v6.2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        # 'minor' bumps the version from 1.0.0 to 1.1.0, 'patch' bumps it to 1.0.1, and 'major' bumps it to 2.0.0
        default_bump: minor

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Image to Docker Hub
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ${{ env.DOCKERFILE_PATH }}/Dockerfile
        push: true
        tags: ${{ env.DOCKERHUB_REPOSITORY }}:${{ steps.tag_version.outputs.new_tag }},${{ env.DOCKERHUB_REPOSITORY }}:latest

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag_version.outputs.new_tag }}
        name: Release ${{ steps.tag_version.outputs.new_tag }}
        generate_release_notes: true